<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arda Yavuz Portfolio</title>
  <meta name="description" content="Arda Yavuz — game developer. Games, devblog, jams, certificates." />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' fill='%230d0b13'/><text x='32' y='46' text-anchor='middle' font-family='Arial Black, Impact, sans-serif' font-size='32' font-weight='900' fill='%23a78bfa'>AY</text></svg>" />

  <!-- Bahnschrift is a Windows system font (no web equivalent); on other OSes we fall through to similar condensed/humanist sans-serifs. -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Outfit:wght@400;500;600;700&family=Anton&family=Archivo+Black&family=DM+Serif+Display:ital@0;1&family=Unbounded:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="styles-variants.css" />

  <style>
    /* prevent flash before React mounts */
    html, body { background: #0d0b13; color: #ece9f3; margin: 0; height: 100%; }
    .boot {
      position: fixed; inset: 0;
      background: #0d0b13;
      z-index: 1;
    }
  </style>
</head>
<body>
  <template id="__bundler_thumbnail">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
      <rect width="100" height="100" fill="#000"/>
      <rect x="14" y="14" width="72" height="72" fill="none" stroke="#a78bfa" stroke-width="4"/>
      <text x="50" y="60" text-anchor="middle" font-family="Anton, Bahnschrift, sans-serif" font-size="36" fill="#f5f5f5" font-weight="700">AY</text>
    </svg>
  </template>
  <div id="app">
    <div class="boot" aria-label="loading"></div>
  </div>

  <!-- React + Babel -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

  <!-- content (plain JS, not JSX) -->
  <script src="content.js"></script>

  <!-- tweaks panel + section components + app -->
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="sections.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
